# Trading Copilot — deploy pipeline
# Runs Terraform plan/apply then deploys the application via scripts/deploy.sh.
# Triggers on pushes to main that touch app/infra code, or via manual dispatch.

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'infra/**'
      - 'Dockerfile'
      - 'scripts/deploy.sh'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  TF_VERSION: "1.9.0"

jobs:
  terraform:
    name: Terraform Plan & Apply
    runs-on: ubuntu-latest
    outputs:
      has-changes: ${{ steps.plan.outputs.has-changes }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        working-directory: infra
        run: terraform init -input=false

      - name: Terraform Plan
        id: plan
        working-directory: infra
        env:
          TF_VAR_ec2_key_pair_name: ${{ secrets.EC2_KEY_PAIR }}
          TF_VAR_allowed_ssh_cidr: ${{ secrets.ALLOWED_SSH_CIDR }}
          TF_VAR_alpaca_api_key: ${{ secrets.ALPACA_API_KEY }}
          TF_VAR_alpaca_secret_key: ${{ secrets.ALPACA_SECRET_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          terraform plan -input=false -out=tfplan

          if terraform show -json tfplan | python3 -c "import sys,json; d=json.load(sys.stdin); sys.exit(0 if any(rc['change']['actions']!=['no-op'] for rc in d.get('resource_changes',[])) else 1)" 2>/dev/null; then
            echo "has-changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has-changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Terraform Apply
        if: steps.plan.outputs.has-changes == 'true'
        working-directory: infra
        env:
          TF_VAR_ec2_key_pair_name: ${{ secrets.EC2_KEY_PAIR }}
          TF_VAR_allowed_ssh_cidr: ${{ secrets.ALLOWED_SSH_CIDR }}
          TF_VAR_alpaca_api_key: ${{ secrets.ALPACA_API_KEY }}
          TF_VAR_alpaca_secret_key: ${{ secrets.ALPACA_SECRET_KEY }}
          TF_VAR_anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
        run: terraform apply -auto-approve -input=false tfplan

  deploy:
    name: Deploy Application
    runs-on: ubuntu-latest
    needs: terraform
    if: always() && needs.terraform.result == 'success'

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (for outputs)
        working-directory: infra
        run: terraform init -input=false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Python (for Lambda packaging)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Package Lambda - CRUD
        run: |
          mkdir -p .build/crud
          cp apps/lambdas/shared/*.py .build/crud/
          cp apps/lambdas/crud/handler.py .build/crud/
          pip install -r apps/lambdas/crud/requirements.txt -t .build/crud/ --quiet
          cd .build/crud && zip -r ../../.build/crud.zip . -x '*.pyc' '__pycache__/*'

      - name: Package Lambda - Trade
        run: |
          mkdir -p .build/trade
          cp apps/lambdas/shared/*.py .build/trade/
          cp apps/lambdas/trade/handler.py .build/trade/
          pip install -r apps/lambdas/trade/requirements.txt -t .build/trade/ --quiet
          cd .build/trade && zip -r ../../.build/trade.zip . -x '*.pyc' '__pycache__/*'

      - name: Package Lambda - Compute Proxy
        run: |
          mkdir -p .build/compute_proxy
          cp apps/lambdas/shared/*.py .build/compute_proxy/
          cp apps/lambdas/compute_proxy/handler.py .build/compute_proxy/
          cd .build/compute_proxy && zip -r ../../.build/compute_proxy.zip . -x '*.pyc' '__pycache__/*'

      - name: Deploy Lambda functions
        run: |
          for fn in crud trade compute-proxy; do
            FN_NAME="trading-copilot-${fn}"
            ZIP_NAME="${fn//-/_}"
            echo "Deploying $FN_NAME from .build/${ZIP_NAME}.zip..."
            aws lambda update-function-code \
              --function-name "$FN_NAME" \
              --zip-file "fileb://.build/${ZIP_NAME}.zip" \
              --region ${{ env.AWS_REGION }} \
              --no-cli-pager
          done

      - name: Run deploy script
        run: |
          chmod +x scripts/deploy.sh
          ./scripts/deploy.sh
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
